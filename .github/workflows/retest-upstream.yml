name: Retest Upstream Students

on:
  workflow_dispatch:
    inputs:
      skip_stuids:
        description: '跳过的学号（逗号分隔，默认跳过已测过的）'
        required: false
        default: ''
      delay_seconds:
        description: '每个学员之间的等待时间（秒）'
        required: false
        default: '30'
      source:
        description: '数据来源：auto=自动从上游读取, embedded=使用内嵌数据'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - embedded
      timeout_minutes:
        description: '触发CI后监控超时时间（分钟），超时后取消所有未结束的流程'
        required: false
        default: '20'

permissions:
  issues: write
  actions: write

jobs:
  retest:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream issues and trigger CI for each student
        id: trigger
        env:
          GH_TOKEN: ${{ secrets.RETEST_GH_TOKEN }}
          REPO: ${{ github.repository }}
          SKIP_STUIDS: ${{ inputs.skip_stuids }}
          DELAY_SECONDS: ${{ inputs.delay_seconds }}
          SOURCE: ${{ inputs.source }}
        run: |
          python3 `pwd`/retest_upstream.py

      - name: Monitor CI progress and post summary
        if: steps.trigger.outputs.ISSUE_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.RETEST_GH_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.trigger.outputs.ISSUE_NUMBER }}
          NUM_STUDENTS: ${{ steps.trigger.outputs.NUM_STUDENTS }}
          TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
        run: |
          python3 `pwd`/monitor_retest.py
